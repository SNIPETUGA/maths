<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathos</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F0E8;
      color: #1C1C1E;
      min-height: 100vh;
      padding: 32px 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .logo { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 36px; height: 36px;
      background: #1C1C1E;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-name { font-size: 20px; font-weight: 500; letter-spacing: 0.1em; }

    .user-info { display: flex; align-items: center; gap: 10px; }
    .username { font-size: 13px; font-weight: 300; color: #8A7B6A; }
    .btn-logout {
      padding: 6px 12px;
      background: transparent;
      border: 0.5px solid rgba(28,28,30,0.2);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 300;
      color: #8A7B6A; cursor: pointer;
    }

    .section-title {
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: #8A7B6A; margin-bottom: 12px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      border: 0.5px solid rgba(28,28,30,0.1);
      display: flex; flex-direction: column; gap: 12px;
    }

    input {
      width: 100%; padding: 12px 14px;
      border: 0.5px solid rgba(28,28,30,0.15);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 300;
      background: #F5F0E8; color: #1C1C1E; outline: none;
    }

    input::placeholder { color: #C4BCAF; }

    .btn-primary {
      padding: 14px; background: #1C1C1E;
      color: #F5F0E8; border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer; letter-spacing: 0.02em;
    }

    .btn-secondary {
      padding: 14px; background: transparent;
      color: #8A7B6A;
      border: 0.5px solid rgba(28,28,30,0.15);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 300;
      cursor: pointer;
    }

    .favour-card {
      background: #fff; border-radius: 14px;
      padding: 14px 16px; margin-bottom: 8px;
      border: 0.5px solid rgba(28,28,30,0.08);
      display: flex; gap: 10px; align-items: flex-start;
    }

    .favour-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #C9A96E; margin-top: 5px; flex-shrink: 0;
    }

    .favour-person { font-size: 14px; font-weight: 500; color: #1C1C1E; }
    .favour-desc { font-size: 13px; font-weight: 300; color: #8A7B6A; margin-top: 2px; }
    .favour-date { font-size: 11px; color: #8A7B6A; margin-top: 4px; letter-spacing: 0.04em; }

    .empty { font-size: 13px; font-weight: 300; color: #8A7B6A; text-align: center; padding: 24px 0; }

    .msg { font-size: 13px; font-weight: 300; text-align: center; color: #8A7B6A; }
    .msg.error { color: #c0392b; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1; padding: 10px;
      text-align: center; font-size: 13px; font-weight: 400;
      border-radius: 10px; cursor: pointer;
      border: 0.5px solid rgba(28,28,30,0.15);
      color: #8A7B6A; background: transparent;
    }
    .tab.active { background: #1C1C1E; color: #F5F0E8; border-color: #1C1C1E; }

    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 56 56" fill="none">
          <path d="M10 44 L10 16 L28 34 L46 16 L46 44" stroke="#F5F0E8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M18 44 L38 44" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="28" cy="34" r="4" fill="#C9A96E"/>
        </svg>
      </div>
      <div class="logo-name">mathos</div>
    </div>
    <div class="user-info hidden" id="user-info">
      <span class="username" id="username-display"></span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </div>

  <!-- Auth screen -->
  <div id="auth-screen">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Log in</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <div class="card">
      <input type="text" id="auth-username" placeholder="Username">
      <input type="password" id="auth-password" placeholder="Password">
      <button class="btn-primary" id="auth-btn" onclick="handleAuth()">Log in</button>
      <div class="msg" id="auth-msg"></div>
    </div>
  </div>

  <!-- App screen -->
  <div id="app-screen" class="hidden">

    <div class="section-title">Log a favour</div>
    <div class="card">
      <input type="text" id="person" placeholder="Who did you do it for?">
      <input type="text" id="description" placeholder="What did you do?">
      <button class="btn-primary" onclick="logFavour()">Log this favour</button>
      <div class="msg" id="log-msg"></div>
    </div>

    <div class="section-title">All favours</div>
    <div id="favours-list"></div>

  </div>

  <script>
    const API = "http://127.0.0.1:5001"
    let currentTab = "login"

    function switchTab(tab) {
      currentTab = tab
      document.getElementById("tab-login").classList.toggle("active", tab === "login")
      document.getElementById("tab-register").classList.toggle("active", tab === "register")
      document.getElementById("auth-btn").textContent = tab === "login" ? "Log in" : "Register"
      document.getElementById("auth-msg").textContent = ""
    }

    async function handleAuth() {
      const username = document.getElementById("auth-username").value.trim()
      const password = document.getElementById("auth-password").value.trim()
      const msg = document.getElementById("auth-msg")

      if (!username || !password) {
        msg.textContent = "Please fill in both fields."
        msg.className = "msg error"
        return
      }

      const endpoint = currentTab === "login" ? "/login" : "/register"
      const res = await fetch(`${API}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ username, password })
      })

      const data = await res.json()

      if (!res.ok) {
        msg.textContent = data.error
        msg.className = "msg error"
        return
      }

      if (currentTab === "register") {
        msg.textContent = "Account created — logging you in..."
        msg.className = "msg"
        await loginUser(username, password)
      } else {
        showApp(username)
      }
    }

    async function loginUser(username, password) {
      const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ username, password })
      })
      if (res.ok) showApp(username)
    }

    function showApp(username) {
      document.getElementById("auth-screen").classList.add("hidden")
      document.getElementById("app-screen").classList.remove("hidden")
      document.getElementById("user-info").classList.remove("hidden")
      document.getElementById("username-display").textContent = username
      loadFavours()
    }

    async function logout() {
      await fetch(`${API}/logout`, {
        method: "POST",
        credentials: "include"
      })
      document.getElementById("auth-screen").classList.remove("hidden")
      document.getElementById("app-screen").classList.add("hidden")
      document.getElementById("user-info").classList.add("hidden")
      document.getElementById("auth-username").value = ""
      document.getElementById("auth-password").value = ""
      document.getElementById("favours-list").innerHTML = ""
    }

    async function loadFavours() {
      const res = await fetch(`${API}/favours`, { credentials: "include" })
      const favours = await res.json()
      const list = document.getElementById("favours-list")

      if (favours.length === 0) {
        list.innerHTML = '<div class="empty">No favours logged yet.</div>'
        return
      }

      list.innerHTML = favours.reverse().map(f => `
        <div class="favour-card">
          <div class="favour-dot"></div>
          <div>
            <div class="favour-person">${f.person}</div>
            <div class="favour-desc">${f.description}</div>
            <div class="favour-date">${f.date}</div>
          </div>
        </div>
      `).join("")
    }

    async function logFavour() {
      const person = document.getElementById("person").value.trim()
      const description = document.getElementById("description").value.trim()
      const msg = document.getElementById("log-msg")

      if (!person || !description) {
        msg.textContent = "Please fill in both fields."
        msg.className = "msg error"
        return
      }

      await fetch(`${API}/favours`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ person, description })
      })

      document.getElementById("person").value = ""
      document.getElementById("description").value = ""
      msg.textContent = "Logged ✓"
      msg.className = "msg"
      setTimeout(() => msg.textContent = "", 2000)
      loadFavours()
    }
  </script>

</body>
</html>
